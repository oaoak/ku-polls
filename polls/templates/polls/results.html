{% load static %}
<head>
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
</head>
<h3>{{ question.question_text }}</h3>
<div>
    {% if user_vote %}
        <p class="votedmsg">Your vote: {{ user_vote.choice.choice_text }}</p>
    {% endif %}
</div>
<div>
    <table id="choices">
        <tr>
            <th>Choices</th>
            <th>Votes</th>
        </tr>
        {% for choice in question.choice_set.all %}
        <tr>
            <td>{{ choice.choice_text }}</td>
            <td>{{ choice.votes }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
<div id="button-container">
    <a href="{% url 'polls:index' %}" ><button id="home-button">Home page</button></a>
</div>
